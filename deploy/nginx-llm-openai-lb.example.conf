# OpenAI 兼容接口（/v1/chat/completions 等）在多台本机端口间负载均衡示例。
#
# 用作「唯一主配置」时必须包含 events + http（见下方结构）。用法：
#   sudo nginx -t -c /path/to/本文件.conf
#   sudo nginx -c /path/to/本文件.conf
#
# 若已用系统 nginx，也可把 http { ... } 内 upstream/server 段复制进 /etc/nginx/nginx.conf 的 http 块。
#
# service_config.json：llm.base_url = http://<IP>:10000/v1

events {
    worker_connections 1024;
}

http {
    upstream llm_openai_compatible {
        # least_conn;
        server 127.0.0.1:9996 weight=1 max_fails=2 fail_timeout=10s;
        server 127.0.0.1:9997 weight=1 max_fails=2 fail_timeout=10s;
        server 127.0.0.1:9998 weight=1 max_fails=2 fail_timeout=10s;
    }

    server {
        listen 10000;

        proxy_connect_timeout 60s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;

        location / {
            proxy_pass http://llm_openai_compatible;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
        }
    }
}
