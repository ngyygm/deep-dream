<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TMG - Temporal Memory Graph</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: '#1a1d27',
            'surface-hover': '#22253a',
            'bg-input': '#141620',
          }
        }
      }
    }
  </script>

  <!-- vis-network.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/standalone/umd/vis-network.min.js"
          crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <!-- Custom Styles -->
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="overflow-hidden" style="background:var(--bg-primary);color:var(--text-primary);">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar w-56 flex flex-col flex-shrink-0 z-50">
      <!-- Logo -->
      <div class="px-4 py-4" style="border-bottom:1px solid var(--border-color);">
        <div class="flex items-center gap-2.5">
          <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:var(--primary-dim);">
            <i data-lucide="brain" style="width:18px;height:18px;color:var(--primary);"></i>
          </div>
          <div>
            <div class="text-sm font-bold leading-tight" style="color:var(--text-primary);">TMG</div>
            <div class="text-[10px] leading-tight" style="color:var(--text-muted);">Temporal Memory Graph</div>
          </div>
        </div>
      </div>

      <!-- Navigation -->
      <nav class="flex-1 px-3 py-3 space-y-0.5 overflow-y-auto">
        <a class="sidebar-link active" href="#dashboard" data-page="dashboard">
          <i data-lucide="layout-dashboard"></i>
          <span data-i18n="nav.dashboard">仪表盘</span>
        </a>
        <a class="sidebar-link" href="#graph" data-page="graph">
          <i data-lucide="network"></i>
          <span data-i18n="nav.graph">图谱</span>
        </a>
        <a class="sidebar-link" href="#memory" data-page="memory">
          <i data-lucide="database"></i>
          <span data-i18n="nav.memory">记忆</span>
        </a>
        <a class="sidebar-link" href="#search" data-page="search">
          <i data-lucide="search"></i>
          <span data-i18n="nav.search">检索</span>
        </a>
        <a class="sidebar-link" href="#entities" data-page="entities">
          <i data-lucide="circle-dot"></i>
          <span data-i18n="nav.entities">实体</span>
        </a>
        <a class="sidebar-link" href="#relations" data-page="relations">
          <i data-lucide="git-branch"></i>
          <span data-i18n="nav.relations">关系</span>
        </a>
        <a class="sidebar-link" href="#communities" data-page="communities" id="nav-communities" style="display:none;">
          <i data-lucide="layout-grid"></i>
          <span data-i18n="nav.communities">Communities</span>
        </a>
        <a class="sidebar-link" href="#episodes" data-page="episodes" id="nav-episodes" style="display:none;">
          <i data-lucide="film"></i>
          <span data-i18n="nav.episodes">Episodes</span>
        </a>
        <a class="sidebar-link" href="#dream" data-page="dream" id="nav-dream" style="display:none;">
          <i data-lucide="sparkles"></i>
          <span data-i18n="nav.dream">DeepDream</span>
        </a>
        <a class="sidebar-link" href="#api-test" data-page="api-test">
          <i data-lucide="terminal"></i>
          <span data-i18n="nav.apiTest">API 测试</span>
        </a>
      </nav>

      <!-- Sidebar Footer -->
      <div class="px-3 py-3" style="border-top:1px solid var(--border-color);">
        <div class="flex items-center gap-2 text-xs" style="color:var(--text-muted);">
          <i data-lucide="info" style="width:14px;height:14px;"></i>
          <span>API: <span id="sidebar-api-status" data-i18n="common.connected">已连接</span></span>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
      <!-- Top Bar -->
      <header class="h-12 flex items-center justify-between px-4 flex-shrink-0" style="border-bottom:1px solid var(--border-color);background:var(--bg-surface);">
        <div class="flex items-center gap-3">
          <!-- Mobile sidebar toggle -->
          <button id="sidebar-toggle" class="btn btn-ghost btn-sm p-1.5 md:hidden">
            <i data-lucide="menu" style="width:18px;height:18px;"></i>
          </button>
          <h1 id="page-title" class="text-sm font-semibold" style="color:var(--text-secondary);">Dashboard</h1>
        </div>
        <div class="flex items-center gap-3">
          <!-- Graph Selector -->
          <div class="flex items-center gap-2">
            <label class="text-xs hidden sm:block" style="color:var(--text-muted);" data-i18n="common.graph">图谱:</label>
            <select id="graph-selector" class="input text-xs py-1 px-2 w-36">
              <option value="default">default</option>
            </select>
          </div>
          <!-- Language selector -->
          <select id="lang-selector" class="input text-xs py-1 px-1.5" style="width:auto;min-width:60px;">
            <option value="zh">中文</option>
            <option value="en">EN</option>
            <option value="ja">日本語</option>
          </select>
          <!-- Theme toggle -->
          <button id="theme-toggle" class="btn btn-ghost btn-sm p-1.5" title="Toggle theme">
            <i data-lucide="moon" id="theme-icon-dark" style="width:16px;height:16px;"></i>
            <i data-lucide="sun" id="theme-icon-light" style="width:16px;height:16px;display:none;"></i>
          </button>
          <!-- Refresh indicator -->
          <div id="refresh-indicator" class="hidden flex items-center gap-1.5 text-xs" style="color:var(--text-muted);">
            <div class="spinner spinner-sm"></div>
            <span data-i18n="common.syncing">同步中</span>
          </div>
        </div>
      </header>

      <!-- Page Content -->
      <main id="page-content" class="flex-1 overflow-y-auto p-4 lg:p-5">
        <!-- Pages are rendered here by the router -->
      </main>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- i18n (must load before app.js) -->
  <script src="/static/js/i18n/zh.js"></script>
  <script src="/static/js/i18n/en.js"></script>
  <script src="/static/js/i18n/ja.js"></script>
  <script src="/static/js/i18n/index.js"></script>

  <!-- Scripts (order matters) -->
  <script src="/static/js/app.js"></script>
  <script src="/static/js/components/toast.js"></script>
  <script src="/static/js/components/modal.js"></script>
  <script src="/static/js/graph-utils.js"></script>
  <script src="/static/js/path-finder.js"></script>
  <script src="/static/js/graph-explorer.js"></script>
  <script src="/static/js/pages/dashboard.js"></script>
  <script src="/static/js/pages/graph.js"></script>
  <script src="/static/js/pages/memory.js"></script>
  <script src="/static/js/pages/search.js"></script>
  <script src="/static/js/pages/entities.js"></script>
  <script src="/static/js/pages/relations.js"></script>
  <script src="/static/js/pages/episodes.js"></script>
  <script src="/static/js/pages/communities.js"></script>
  <script src="/static/js/pages/dream.js"></script>
  <script src="/static/js/pages/api-test.js"></script>
</body>
</html>
